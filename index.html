<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brend Çanta Qalereyası</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">BÇQ</div>
    <ul>
        <li><a href="#gucci">Gucci</a></li>
        <li><a href="#chanel">Chanel</a></li>
        <li><a href="#prada">Prada</a></li>
        <li><a href="#hermes">Hermes</a></li>
    </ul>
</nav>

<header>
    <h1>Eksklüziv Kolleksiya</h1>
    <p>Premium Brendlər</p>
</header>

<div class="main-content">
    <section id="gucci" class="products-section">
        <h2 class="section-title">Gucci</h2>
        <div class="products-grid">
            <script>
                for(let i=1; i<=5; i++) {
                    document.write(`
                        <div class="product-card">
                            <img src="gucci${i}.jpg" onerror="this.src='gucci${i}.webp'" alt="Bag">
                            <div class="product-info">
                                <h3>Gucci Model ${i}</h3>
                                <a href="https://wa.me/12025550123" class="btn-order">Sifariş</a>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </section>

    <section id="chanel" class="products-section">
        <h2 class="section-title">Chanel</h2>
        <div class="products-grid">
            <script>
                for(let i=1; i<=5; i++) {
                    document.write(`
                        <div class="product-card">
                            <img src="chanel${i}.jpg" onerror="this.src='chanel${i}.webp'" alt="Bag">
                            <div class="product-info">
                                <h3>Chanel Model ${i}</h3>
                                <a href="https://wa.me/12025550123" class="btn-order">Sifariş</a>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </section>

    <section id="hermes" class="products-section">
        <h2 class="section-title">Hermes</h2>
        <div class="products-grid">
            <script>
                for(let i=1; i<=5; i++) {
                    document.write(`
                        <div class="product-card">
                            <img src="hermes${i}.jpg" onerror="this.src='hermes${i}.webp'" alt="Bag">
                            <div class="product-info">
                                <h3>Hermes Model ${i}</h3>
                                <a href="https://wa.me/12025550123" class="btn-order">Sifariş</a>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </section>
</div>

</body>
</html>
