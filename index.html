<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Brend Çanta Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Brend Çanta Shop</h1>

    <!-- SEARCH -->
    <input type="text" id="searchInput" placeholder="Axtar..." onkeyup="searchProducts()">

    <!-- CART -->
    <div class="cart">
        🛒 Səbət: <span id="cartCount">0</span>
    </div>
</header>

<section>

<h2>Gucci</h2>

<div class="products-grid" id="productList">

<!-- PRODUCT 1 -->
<div class="product-card">
    <img src="images/gucci1.jpg">
    <h3>Gucci Marmont</h3>
    <p class="price">6500 AZN</p>
    <button onclick="addToCart()">Səbətə at</button>
</div>

<!-- PRODUCT 2 -->
<div class="product-card">
    <img src="images/gucci2.jpg">
    <h3>Gucci Dionysus</h3>
    <p class="price">7200 AZN</p>
    <button onclick="addToCart()">Səbətə at</button>
</div>

<!-- Chanel -->
<div class="product-card">
    <img src="images/chanel1.jpg">
    <h3>Chanel Classic</h3>
    <p class="price">9000 AZN</p>
    <button onclick="addToCart()">Səbətə at</button>
</div>

</div>
</section>

<footer>
<p>© 2026 Shop</p>
</footer>

<script>
let cart = 0;

// CART FUNCTION
function addToCart() {
    cart++;
    document.getElementById("cartCount").innerText = cart;
}

// SEARCH FUNCTION
function searchProducts() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let products = document.querySelectorAll(".product-card");

    products.forEach(product => {
        let name = product.querySelector("h3").innerText.toLowerCase();

        if (name.includes(input)) {
            product.style.display = "block";
        } else {
            product.style.display = "none";
        }
    });
}
</script>

</body>
</html>
